# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-ast
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/akaihola/darker
    rev: v3.0.0
    hooks:
      - id: darker
        args:
          - --line-length=120
        additional_dependencies:
          - black

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args: [ --profile=black ]

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt (write)
        entry: shfmt -w -i 2 -ci
        language: system
        files: '^(\./)?(scripts/.*\.sh|\.githooks/pre-commit)$'
        require_serial: true
      - id: repo-hygiene
        name: repo hygiene (portable paths)
        entry: python scripts/check_repo_hygiene.py
        language: python
        types: [text]

  - repo: local
    hooks:
      - id: kb-gate
        name: kb gate (staged)
        language: system
        entry: bash kb/tooling/kb-pre-commit.sh
        pass_filenames: false
        always_run: true
        require_serial: true
