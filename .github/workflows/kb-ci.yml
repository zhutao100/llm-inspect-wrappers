name: kb-gate

on:
  pull_request:
  push:

jobs:
  kb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y universal-ctags
      - name: Install kb (latest release)
        run: bash kb/tooling/install_kb.sh
      - name: Run kb gate (worktree)
        run: bash kb/tooling/kb-ci-check.sh
